<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tilt Racer &mdash; AppADay 048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
:root {
  --black:#0a0a0f; --neon:#00f5c4; --hot:#ff3f6c;
  --amber:#ffb830; --white:#f0f0f0; --dim:rgba(240,240,240,0.45);
}
html,body { width:100%;height:100%;background:var(--black);overflow:hidden;
  font-family:'Inter',sans-serif;color:var(--white);touch-action:none; }
#gameCanvas { display:block;width:100%;height:100%; }

.screen { position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(10,10,15,0.93);
  backdrop-filter:blur(8px);z-index:10;padding:20px;text-align:center;overflow-y:auto; }
.screen.hidden { display:none; }

.logo { font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(2.2rem,9vw,4rem);letter-spacing:.04em;color:var(--neon);
  text-shadow:0 0 24px rgba(0,245,196,.6),0 0 60px rgba(0,245,196,.25);
  line-height:1;margin-bottom:6px; }
.tagline { font-family:'Orbitron',monospace;font-size:clamp(.65rem,2.5vw,.9rem);
  color:var(--amber);letter-spacing:.18em;text-transform:uppercase;margin-bottom:28px; }

.btn { font-family:'Orbitron',monospace;font-weight:700;
  font-size:clamp(.85rem,3.5vw,1.1rem);letter-spacing:.1em;color:var(--black);
  background:var(--neon);border:none;border-radius:6px;padding:14px 36px;
  cursor:pointer;box-shadow:0 0 20px rgba(0,245,196,.4);margin:6px;transition:.1s; }
.btn:active { transform:scale(.96); }
.btn.secondary { background:transparent;color:var(--neon);border:2px solid var(--neon);box-shadow:none; }
.btn.danger    { background:var(--hot);box-shadow:0 0 20px rgba(255,63,108,.4); }

.tab-row { display:flex;gap:8px;margin-bottom:20px; }
.tab { font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.12em;
  padding:8px 16px;border:2px solid rgba(0,245,196,.3);border-radius:4px;
  cursor:pointer;color:rgba(240,240,240,.5);background:transparent;transition:.15s; }
.tab.active { border-color:var(--neon);color:var(--neon);background:rgba(0,245,196,.08); }

.section-title { font-family:'Orbitron',monospace;font-size:.72rem;
  letter-spacing:.2em;color:rgba(0,245,196,.5);text-transform:uppercase;margin:16px 0 10px; }

.car-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  width:100%;max-width:340px;margin-bottom:14px; }
.car-option { border:2px solid rgba(255,255,255,.12);border-radius:8px;
  padding:10px 6px;cursor:pointer;transition:.15s;background:rgba(255,255,255,.04); }
.car-option.selected { border-color:var(--neon);background:rgba(0,245,196,.1); }
.car-option .car-label { font-size:.62rem;letter-spacing:.08em;color:var(--dim);
  margin-top:5px;font-family:'Orbitron',monospace; }
.color-grid { display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  max-width:300px;margin-bottom:20px; }
.color-swatch { width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:.15s; }
.color-swatch.selected { border-color:var(--white);transform:scale(1.15); }

.lb-list { width:100%;max-width:340px;margin-bottom:16px; }
.lb-row { display:flex;align-items:center;padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.07);gap:10px; }
.lb-rank  { font-family:'Orbitron',monospace;font-size:.78rem;color:var(--amber);width:22px;flex-shrink:0; }
.lb-name  { font-size:.82rem;flex:1; }
.lb-time  { font-family:'Orbitron',monospace;font-size:.82rem;color:var(--neon); }
.lb-empty { color:var(--dim);font-size:.85rem;padding:20px; }

.name-input { font-family:'Orbitron',monospace;font-size:1rem;
  background:rgba(255,255,255,.06);border:2px solid rgba(0,245,196,.3);
  border-radius:6px;color:var(--white);padding:12px 16px;width:100%;
  max-width:280px;text-align:center;margin-bottom:14px;outline:none; }
.name-input:focus { border-color:var(--neon); }

/* HUD */
#hud { position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:5; }
#hud.hidden { display:none; }
.hud-top { display:flex;justify-content:space-between;align-items:flex-start;padding:12px 18px; }
.hud-block { display:flex;flex-direction:column;align-items:center; }
.hud-label { font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:.2em;
  color:rgba(0,245,196,.5);text-transform:uppercase;margin-bottom:2px; }
.hud-value { font-family:'Orbitron',monospace;font-weight:700;
  font-size:clamp(.95rem,4vw,1.4rem);color:var(--white); }
.hud-value.alert { color:var(--hot); }

/* Race progress bar */
#progressBar { height:5px;background:rgba(255,255,255,.07);position:relative; }
#progressFill { height:100%;background:linear-gradient(90deg,var(--neon),var(--amber));
  width:0%;transition:width .15s; }
#progressPlayer { position:absolute;top:-4px;width:10px;height:12px;
  background:var(--hot);border-radius:2px;transform:translateX(-50%); }

/* Position strip */
#posStrip { background:rgba(0,0,0,.55);padding:4px 18px;
  display:flex;justify-content:space-between;align-items:center; }
.pos-label { font-family:'Orbitron',monospace;font-size:.5rem;
  letter-spacing:.15em;color:rgba(255,255,255,.4); }
.pos-value { font-family:'Orbitron',monospace;font-weight:700;
  font-size:clamp(.9rem,3.5vw,1.2rem); }

/* Spin-out overlay */
#spinBanner { position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(1.4rem,6vw,2.4rem);color:var(--hot);
  text-shadow:0 0 20px rgba(255,63,108,.7);letter-spacing:.08em;
  pointer-events:none;z-index:8;opacity:0;transition:opacity .2s; }
#spinBanner.show { opacity:1; }

/* Finish banner */
#finishBanner { position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(2rem,8vw,3.5rem);color:var(--amber);
  text-shadow:0 0 30px rgba(255,184,48,.8);letter-spacing:.06em;
  pointer-events:none;z-index:8;opacity:0;transition:opacity .3s; }
#finishBanner.show { opacity:1; }

/* Speed bar */
#speedBar { position:fixed;bottom:0;left:0;right:0;height:4px;
  background:rgba(255,255,255,.06);z-index:5; }
#speedFill { height:100%;background:linear-gradient(90deg,var(--neon),var(--amber));
  width:0%;transition:width .1s; }

/* Game over */
.go-place { font-family:'Orbitron',monospace;font-size:clamp(1.6rem,7vw,3rem);
  color:var(--amber);margin-bottom:4px; }
.go-time  { font-family:'Orbitron',monospace;font-size:clamp(1.1rem,4.5vw,1.8rem);
  color:var(--neon);margin-bottom:4px; }
.go-sub   { font-size:.8rem;color:var(--dim);margin-bottom:18px; }
.go-new   { font-family:'Orbitron',monospace;font-size:.72rem;color:var(--hot);
  letter-spacing:.15em;margin-bottom:10px; }

#backLink { position:fixed;bottom:10px;right:14px;font-size:.62rem;
  color:rgba(240,240,240,.18);text-decoration:none;z-index:5; }
#backLink:hover { color:var(--neon); }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- START -->
<div class="screen" id="startScreen">
  <div class="logo">TILT<br>RACER</div>
  <div class="tagline">AppADay &mdash; 048</div>
  <div class="tab-row">
    <button class="tab active" data-tab="play">RACE</button>
    <button class="tab" data-tab="garage">GARAGE</button>
    <button class="tab" data-tab="scores">TIMES</button>
  </div>
  <div id="tabPlay">
    <p style="font-size:.82rem;color:var(--dim);margin-bottom:8px;max-width:280px;line-height:1.6;">
      Race 1500m against 7 opponents.<br>Tilt to steer. Spin-outs cost time, not the race.</p>
    <p style="font-family:'Orbitron',monospace;font-size:.65rem;color:rgba(0,245,196,.45);
      letter-spacing:.12em;margin-bottom:22px;">BEST TIME WINS</p>
    <button class="btn" id="startBtn">START RACE</button>
  </div>
  <div id="tabGarage" class="hidden">
    <div class="section-title">Choose Your Ride</div>
    <div class="car-grid" id="carGrid"></div>
    <div class="section-title">Paint Job</div>
    <div class="color-grid" id="colorGrid"></div>
  </div>
  <div id="tabScores" class="hidden">
    <div class="section-title">Fastest Times</div>
    <div class="lb-list" id="lbList"></div>
    <button class="btn secondary" id="clearScoresBtn"
      style="font-size:.68rem;padding:8px 18px;">CLEAR TIMES</button>
  </div>
</div>

<!-- GAME OVER -->
<div class="screen hidden" id="gameOverScreen">
  <div class="go-place" id="goPlace">1ST PLACE</div>
  <div class="go-time"  id="goTime">0:00.0</div>
  <div class="go-sub"   id="goSub">0 spin-outs</div>
  <div class="go-new hidden" id="newRecord">&starf; NEW RECORD &starf;</div>
  <input class="name-input" id="nameInput" placeholder="YOUR NAME" maxlength="12">
  <button class="btn" id="saveScoreBtn">SAVE TIME</button>
  <button class="btn secondary" id="retryBtn">RACE AGAIN</button>
  <button class="btn danger" id="menuBtn">MENU</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-top">
    <div class="hud-block">
      <span class="hud-label">Time</span>
      <span class="hud-value" id="hudTime">0:00.0</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">Position</span>
      <span class="hud-value" id="hudPos">8th</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">Speed</span>
      <span class="hud-value" id="hudSpeed">0</span>
    </div>
  </div>
  <div id="progressBar">
    <div id="progressFill"></div>
    <div id="progressPlayer"></div>
  </div>
  <div id="posStrip">
    <span class="pos-label">START</span>
    <span class="pos-value" style="font-size:.65rem;color:var(--dim);" id="distLabel">0 / 1500m</span>
    <span class="pos-label">FINISH</span>
  </div>
</div>

<div id="spinBanner">SPIN OUT!</div>
<div id="finishBanner">FINISH!</div>
<div id="speedBar"><div id="speedFill"></div></div>
<a href="https://augustineiacopelli.github.io/appaday/" id="backLink">&larr; AppADay</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// STORAGE
// ============================================================
function lsGet(k,d){try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ============================================================
// LEADERBOARD  (lower time = better)
// ============================================================
let leaderboard = lsGet('tiltRacerLB2',[]);
function fmtTime(s){
  const m=Math.floor(s/60), sec=s%60;
  return m+':'+(sec<10?'0':'')+sec.toFixed(1);
}
function saveEntry(name,time,spinouts,place){
  leaderboard.push({name:name||'ANON',time,spinouts,place});
  leaderboard.sort((a,b)=>a.time-b.time);
  leaderboard=leaderboard.slice(0,10);
  lsSet('tiltRacerLB2',leaderboard);
}
function getBestTime(){ return leaderboard.length?leaderboard[0].time:Infinity; }
function renderLB(){
  const el=document.getElementById('lbList');
  if(!leaderboard.length){el.innerHTML='<div class="lb-empty">No times yet. Go race!</div>';return;}
  el.innerHTML=leaderboard.map((e,i)=>`
    <div class="lb-row">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${e.name}
        <span style="font-size:.65rem;color:var(--dim);margin-left:6px;">${e.place}</span></span>
      <span class="lb-time">${fmtTime(e.time)}</span>
    </div>`).join('');
}

// ============================================================
// CAR TYPES & COLOURS
// ============================================================
const CAR_TYPES=[
  {id:'sedan', label:'SEDAN'},
  {id:'muscle',label:'MUSCLE'},
  {id:'truck', label:'TRUCK'},
  {id:'sports',label:'SPORTS'},
  {id:'van',   label:'VAN'},
  {id:'kart',  label:'KART'},
];
const CAR_COLORS=['#ff3f6c','#00f5c4','#ffb830','#4488ff',
  '#cc44ff','#ff8844','#ffffff','#44ff88','#ff44cc','#aaddff'];
let selectedType  = lsGet('tiltRacerType2','sedan');
let selectedColor = lsGet('tiltRacerColor2','#ff3f6c');

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas=document.getElementById('gameCanvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080810);
scene.fog=new THREE.Fog(0x080810,45,140);
const camera=new THREE.PerspectiveCamera(60,1,.1,220);
camera.position.set(0,4.2,9);

function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize',resize);

// ============================================================
// ROAD / CURVE
// ============================================================
const RACE_DIST  = 1500;   // metres (world units)
const SEG_LEN    = 8;
const SEG_COUNT  = Math.ceil(RACE_DIST/SEG_LEN)+20;
const ROAD_W     = 11;
const VIS_SEGS   = 50;    // how many segments rendered at once

// Generate full course curve up front
const curveX = [];        // lateral centre offset per segment
(function buildCurve(){
  for(let i=0;i<SEG_COUNT;i++){
    const t=i/SEG_COUNT;
    // gentle at start, wigglier in middle, straightens for finish
    const intensity = Math.sin(t*Math.PI)*3.5;
    curveX[i]=(Math.sin(i*.22)*2.2+Math.sin(i*.07)*1.8)*intensity;
  }
  // Force straight start & finish
  for(let i=0;i<8;i++) curveX[i]=0;
  for(let i=SEG_COUNT-8;i<SEG_COUNT;i++) curveX[i]=0;
})();

function segZ(idx){ return -idx*SEG_LEN; }
function getXAt(worldZ){ // interpolate curve offset at a given world Z
  const idx=Math.max(0,Math.min(SEG_COUNT-1,-worldZ/SEG_LEN));
  const i=Math.floor(idx), f=idx-i;
  const a=curveX[i]||0, b=curveX[Math.min(SEG_COUNT-1,i+1)]||0;
  return a+(b-a)*f;
}

// Road materials
const roadMat  = new THREE.MeshLambertMaterial({color:0x1a1a2a});
const dashMat  = new THREE.MeshBasicMaterial({color:0xffffff,opacity:.28,transparent:true});
const edgeMat  = new THREE.MeshBasicMaterial({color:0x00f5c4,opacity:.5,transparent:true});
const kerbRed  = new THREE.MeshLambertMaterial({color:0xdd2222});
const kerbWht  = new THREE.MeshLambertMaterial({color:0xeeeeee});
const finishMat= new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide});

// Pre-build road pool (VIS_SEGS segments recycled)
const segPool=[];
for(let i=0;i<VIS_SEGS;i++){
  const roadGeo=new THREE.PlaneGeometry(ROAD_W,SEG_LEN);
  const road=new THREE.Mesh(roadGeo,roadMat); road.rotation.x=-Math.PI/2;
  const kGeo=new THREE.BoxGeometry(.5,.1,SEG_LEN);
  const kL=new THREE.Mesh(kGeo,kerbRed); kL.position.y=.05;
  const kR=new THREE.Mesh(kGeo,kerbWht); kR.position.y=.05;
  const dGeoA=new THREE.PlaneGeometry(.1,2.8); const dA=new THREE.Mesh(dGeoA,dashMat); dA.rotation.x=-Math.PI/2;
  const dGeoB=new THREE.PlaneGeometry(.1,2.8); const dB=new THREE.Mesh(dGeoB,dashMat); dB.rotation.x=-Math.PI/2;
  const eGeo=new THREE.PlaneGeometry(.14,SEG_LEN);
  const eL=new THREE.Mesh(eGeo,edgeMat); eL.rotation.x=-Math.PI/2;
  const eR=new THREE.Mesh(eGeo,edgeMat); eR.rotation.x=-Math.PI/2;
  scene.add(road,kL,kR,dA,dB,eL,eR);
  segPool.push({road,kL,kR,dA,dB,eL,eR,assignedIdx:-1});
}

function placeSegment(pool,idx){
  const cx=curveX[Math.min(SEG_COUNT-1,idx)]||0;
  const z=segZ(idx);
  const km=idx%2===0?kerbRed:kerbWht;
  pool.road.position.set(cx,0,z);
  pool.kL.position.set(cx-ROAD_W/2-.26,.05,z);
  pool.kR.position.set(cx+ROAD_W/2+.26,.05,z);
  // alternate kerb colour
  pool.kL.material=idx%2===0?kerbRed:kerbWht;
  pool.kR.material=idx%2===0?kerbWht:kerbRed;
  pool.dA.position.set(cx-ROAD_W/3,.01,z);
  pool.dB.position.set(cx+ROAD_W/3,.01,z);
  pool.eL.position.set(cx-ROAD_W/2,.015,z);
  pool.eR.position.set(cx+ROAD_W/2,.015,z);
  pool.assignedIdx=idx;
}
// Initial placement
for(let i=0;i<VIS_SEGS;i++) placeSegment(segPool[i],i);

// Finish line
const finLine=new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W,.8),finishMat);
finLine.rotation.x=-Math.PI/2;
finLine.position.set(0,.02,segZ(Math.floor(RACE_DIST/SEG_LEN)));
scene.add(finLine);
// Checkerboard on finish
const finChk=[];
for(let col=0;col<8;col++){
  for(let row=0;row<2;row++){
    if((col+row)%2===0){
      const m=new THREE.Mesh(
        new THREE.PlaneGeometry(ROAD_W/8,.4),
        new THREE.MeshBasicMaterial({color:0x000000}));
      m.rotation.x=-Math.PI/2;
      m.position.set(-ROAD_W/2+(col+.5)*(ROAD_W/8),.022,segZ(Math.floor(RACE_DIST/SEG_LEN))+(row-.5)*.4);
      scene.add(m);
      finChk.push(m);
    }
  }
}

// Lamp posts
const lampGrp=[];
const poleGeo=new THREE.CylinderGeometry(.055,.075,5,6);
const poleMat=new THREE.MeshLambertMaterial({color:0x334455});
const headGeo=new THREE.BoxGeometry(.38,.14,.75);
const headMat=new THREE.MeshBasicMaterial({color:0xffeebb});
for(let i=0;i<SEG_COUNT;i+=4){
  const cx=curveX[Math.min(SEG_COUNT-1,i)]||0;
  const z=segZ(i);
  [-1,1].forEach(side=>{
    const g=new THREE.Group();
    const pole=new THREE.Mesh(poleGeo,poleMat); pole.position.y=2.5; g.add(pole);
    const head=new THREE.Mesh(headGeo,headMat); head.position.set(0,5.1,-.18); g.add(head);
    g.position.set(cx+side*(ROAD_W/2+1.35),0,z);
    if(side===1) g.rotation.y=Math.PI;
    scene.add(g); lampGrp.push(g);
  });
}

// ============================================================
// LIGHTING
// ============================================================
scene.add(new THREE.AmbientLight(0xffffff,.5));
const sun=new THREE.DirectionalLight(0xffeedd,1.0); sun.position.set(5,20,5); scene.add(sun);
const neonFill=new THREE.PointLight(0x00f5c4,1.4,22); neonFill.position.set(0,4,4); scene.add(neonFill);

// ============================================================
// CAR BUILDER
// ============================================================
function h2i(hex){return parseInt(hex.replace('#',''),16);}

function buildCarMesh(typeId,colorHex){
  const col=h2i(colorHex);
  const bMat=new THREE.MeshLambertMaterial({color:col});
  const gMat=new THREE.MeshBasicMaterial({color:0x00f5c4,opacity:.2,transparent:true,side:THREE.DoubleSide});
  const tMat=new THREE.MeshLambertMaterial({color:0x111111});
  const rMat=new THREE.MeshLambertMaterial({color:0xaaaaaa});
  const lMat=new THREE.MeshBasicMaterial({color:0xffffaa});
  const rlMat=new THREE.MeshBasicMaterial({color:0xff2200});
  const cMat=new THREE.MeshLambertMaterial({color:0xcccccc});
  const g=new THREE.Group();

  function box(w,h,d,mat,x,y,z){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z);g.add(m);return m;
  }
  function cyl(rt,rb,h,seg,mat,x,y,z,rx,rz){
    const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
    m.position.set(x,y,z);if(rx!==undefined)m.rotation.x=rx;
    if(rz!==undefined)m.rotation.z=rz;g.add(m);return m;
  }
  function wheel(x,y,z){
    cyl(.3,.3,.22,14,tMat,x,y,z,0,Math.PI/2);
    cyl(.16,.16,.23,8,rMat,x,y,z,0,Math.PI/2);
  }

  if(typeId==='sedan'){
    box(1.5,.48,2.8,bMat,0,.44,0);
    box(1.1,.41,1.48,bMat,0,.86,-.08);
    box(.94,.33,.05,gMat,0,.87,.67);
    box(.94,.28,.05,gMat,0,.83,-.83);
    box(.05,.28,.68,gMat,-.52,.87,-.08);
    box(.05,.28,.68,gMat,.52,.87,-.08);
    box(.15,.05,2.82,cMat,0,.68,0);
    box(.22,.12,.05,lMat,-.48,.47,1.41);
    box(.22,.12,.05,lMat,.48,.47,1.41);
    box(.22,.1,.05,rlMat,-.48,.44,-1.41);
    box(.22,.1,.05,rlMat,.48,.44,-1.41);
    box(1.5,.18,.12,cMat,0,.27,1.44);
    box(1.5,.18,.12,cMat,0,.27,-1.44);
    wheel(-.82,.3,.94);wheel(.82,.3,.94);
    wheel(-.82,.3,-.94);wheel(.82,.3,-.94);
  } else if(typeId==='muscle'){
    box(1.65,.52,3.0,bMat,0,.47,0);

// ============================================================
// TRAFFIC COLOURS for mini-canvas silhouettes
// ============================================================
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function drawSilhouette(ctx,type,cx,cy,col){
  ctx.fillStyle=col;ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.2;
  if(type==='sedan'){
    roundRect(ctx,cx-16,cy-26,32,52,5);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,245,196,.28)';roundRect(ctx,cx-11,cy-15,22,28,3);ctx.fill();
  } else if(type==='muscle'){
    roundRect(ctx,cx-19,cy-26,38,52,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,245,196,.28)';roundRect(ctx,cx-12,cy-13,24,22,3);ctx.fill();
    ctx.fillStyle=col;roundRect(ctx,cx-4,cy-24,8,12,2);ctx.fill();
  } else if(type==='truck'){
    ctx.fillStyle=col;roundRect(ctx,cx-19,cy-26,38,28,5);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,.22)';roundRect(ctx,cx-19,cy+2,38,22,3);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.18)';ctx.stroke();
  } else if(type==='sports'){
    ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(cx,cy-4,17,26,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,245,196,.28)';ctx.beginPath();ctx.ellipse(cx,cy-7,11,16,0,0,Math.PI*2);ctx.fill();
  } else if(type==='van'){
    roundRect(ctx,cx-21,cy-28,42,56,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,245,196,.22)';roundRect(ctx,cx-17,cy-24,34,22,3);ctx.fill();
  } else {
    ctx.fillStyle=col;roundRect(ctx,cx-13,cy-24,26,48,7);ctx.fill();ctx.stroke();
    roundRect(ctx,cx-22,cy-22,44,5,2);ctx.fill();ctx.stroke();
    roundRect(ctx,cx-20,cy+18,40,5,2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#111';
    [[-17,-16],[17,-16],[-17,16],[17,16]].forEach(([ox,oy])=>{
      ctx.beginPath();ctx.ellipse(cx+ox,cy+oy,6,8,0,0,Math.PI*2);ctx.fill();
    });
  }
}

function getPlayerPlace(){
  let ahead=0;
  opponents.forEach(o=>{ if(o.dist>playerDist) ahead++; });
  return ahead+1;
}

function startRace(){
  playerDist=0; playerSpeed=0; playerX=0; elapsed=0;
  spinouts=0; spinning=false; spinTimer=0; spinAngle=0;
  wheelRot=0; finishShown=false;
  playerCar.position.z=4; playerCar.rotation.y=0; playerCar.rotation.z=0;

  // Reset and stagger opponents on grid
  const gridSpacing=10;
  opponents.forEach((o,i)=>{
    o.dist=-(i+1)*gridSpacing; // staggered BEHIND start by spacing
    // each opponent has unique character: some fast starters, some slow
    const personality=.78+Math.random()*.38;
    o.baseSpeed=PLAYER_TOP_SPEED*personality;
    o.speed=o.baseSpeed*.3;
    o.lane=i%3;
    o.laneChangeTimer=2+Math.random()*4;
    o.spinout=false; o.spinTimer=0;
    // Place on grid
    const worldZ=4-(-o.dist); // they start behind player
    const cx=getXAt(worldZ);
    o.mesh.position.set(cx+LANE_X[o.lane],0,worldZ);
    o.mesh.rotation.y=0;o.mesh.rotation.z=0;
    o.mesh.visible=true;
  });

  spinBanner.classList.remove('show');
  finishBanner.classList.remove('show');
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  state='racing'; lastTime=null;
  if(animId) cancelAnimationFrame(animId);
  loop(0);
}

function endRace(){
  state='done';
  hud.classList.add('hidden');
  finishBanner.classList.add('show');
  setTimeout(()=>{
    finishBanner.classList.remove('show');
    showResults();
  },2200);
}

function showResults(){
  gameOverScreen.classList.remove('hidden');
  const place=getPlayerPlace();
  const placeTxt=PLACE_LABELS[Math.min(place-1,7)]+' PLACE';
  document.getElementById('goPlace').textContent=placeTxt;
  document.getElementById('goTime').textContent=fmtTime(elapsed);
  document.getElementById('goSub').textContent=
    spinouts===0?'Clean race! No spin-outs.':
    spinouts===1?'1 spin-out':spinouts+' spin-outs';
  const isRecord = elapsed < getBestTime();
  document.getElementById('newRecord').classList.toggle('hidden',!isRecord);
  const ni=document.getElementById('nameInput');
  ni.value=lsGet('tiltRacerName','')||'';
  document.getElementById('saveScoreBtn').textContent='SAVE TIME';
  document.getElementById('saveScoreBtn').disabled=false;
}

// ============================================================
// COLLISION CHECK (player vs opponents)
// ============================================================
function checkCollisions(){
  if(spinning) return;
  for(const o of opponents){
    if(o.spinout) continue;
    const dx=Math.abs(o.mesh.position.x-playerCar.position.x);
    const dz=Math.abs(o.mesh.position.z-playerCar.position.z);
    if(dx<1.2&&dz<2.6){ triggerSpinout(); return; }
  }
}

function triggerSpinout(){
  spinning=true; spinTimer=SPIN_DUR; spinouts++;
  spinAngle=playerCar.rotation.y;
  playerSpeed*=.1;
  spinBanner.classList.add('show');
  setTimeout(()=>spinBanner.classList.remove('show'),1800);
}

// ============================================================
// ROAD RECYCLER (keep VIS_SEGS around the player)
// ============================================================
function updateRoad(playerWorldZ){
  // Float VIS_SEGS segments around the player
  const nearestIdx = Math.max(0, Math.floor(-playerWorldZ / SEG_LEN) - 3);
  for(let s = 0; s < VIS_SEGS; s++){
    const targetIdx = nearestIdx + s;
    if(targetIdx >= SEG_COUNT) {
      // Past finish — hide leftover pool slots
      const pool = segPool[s];
      if(pool.assignedIdx !== -99){
        pool.road.position.y = -999;
        pool.kL.position.y   = -999;
        pool.kR.position.y   = -999;
        pool.eL.position.y   = -999;
        pool.eR.position.y   = -999;
        pool.dA.position.y   = -999;
        pool.dB.position.y   = -999;
        pool.assignedIdx = -99;
      }
      continue;
    }
    const pool = segPool[s];
    if(pool.assignedIdx !== targetIdx) placeSegment(pool, targetIdx);
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop(now){
  animId=requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;renderer.render(scene,camera);return;}
  const dt=Math.min((now-lastTime)/1000,.05);
  lastTime=now;

  if(state==='start'||state==='done'){
    // Idle: slow road drift
    camera.position.x=Math.sin(now*.0003)*1.2;
    camera.position.y=4.2+Math.sin(now*.0005)*.25;
    camera.lookAt(0, 0.8, camera.position.z - 30);
    renderer.render(scene,camera);
    return;
  }

  if(state!=='racing') return;

  elapsed+=dt;
  wheelRot+=playerSpeed*dt*2.8;

  // ---- PLAYER INPUT ----
  if(spinning){
    spinTimer-=dt;
    // Spin animation
    spinAngle+=dt*4.5;
    playerCar.rotation.y=spinAngle;
    playerCar.rotation.z=Math.sin(spinAngle*2)*.18;
    // Slow recovery
    playerSpeed=Math.max(0, playerSpeed-DECEL*dt*.6);
    if(spinTimer<=0){
      spinning=false;
      playerCar.rotation.y=0;
      playerCar.rotation.z=0;
    }
  } else {
    // Keyboard tilt
    if(usingKeyboard){
      if(keys['ArrowLeft']||keys['a'])  tiltX=Math.max(-1,tiltX-.09);
      else if(keys['ArrowRight']||keys['d']) tiltX=Math.min(1,tiltX+.09);
      else tiltX*=.8;
    }
    // Accelerate
    playerSpeed=Math.min(PLAYER_TOP_SPEED, playerSpeed+ACCEL*dt);
    // Steer — follow road curve
    const roadCenter=getXAt(-playerDist);
    const halfW=ROAD_W/2-.95;
    playerX=Math.max(roadCenter-halfW,Math.min(roadCenter+halfW, playerX+tiltX*7*dt));
    playerCar.rotation.z=-tiltX*.1;
    playerCar.rotation.y=-tiltX*.07;
  }

  playerDist+=playerSpeed*dt;
  const playerWorldZ=-playerDist;
  playerCar.position.x=playerX;
  playerCar.position.z=playerWorldZ;

  // Spin player wheels
  playerCar.children.forEach(ch=>{
    if(ch.geometry&&ch.geometry.type==='CylinderGeometry'){
      const p=ch.geometry.parameters;
      if(p&&p.radiusTop>.2) ch.rotation.x=wheelRot;
    }
  });

  // ---- OPPONENTS ----
  opponents.forEach(o=>{
    if(o.spinout){
      o.spinTimer-=dt;
      o.mesh.rotation.y+=dt*3.5;
      o.speed=Math.max(0,o.speed-20*dt);
      if(o.spinTimer<=0){o.spinout=false;o.mesh.rotation.y=0;}
    } else {
      // Rubber-band: opponents speed up if player is far ahead, slow if behind
      const gap=playerDist-o.dist;
      const rbFactor=gap>80?1.12:gap<-40?.86:1.0;
      const targetSpeed=Math.min(o.baseSpeed*rbFactor,PLAYER_TOP_SPEED*1.05);
      o.speed+=(targetSpeed-o.speed)*dt*1.2;
      // Occasional lane change
      o.laneChangeTimer-=dt;
      if(o.laneChangeTimer<=0){
        o.lane=(o.lane+Math.floor(Math.random()*3))%3;
        o.laneChangeTimer=2+Math.random()*5;
      }
    }
    o.dist+=o.speed*dt;
    const oz=-o.dist;
    const cx=getXAt(oz);
    o.mesh.position.x+=((cx+LANE_X[o.lane])-o.mesh.position.x)*dt*3;
    o.mesh.position.z=oz;
    // Cull very far opponents
    const relZ=o.mesh.position.z-playerWorldZ;
    o.mesh.visible=(relZ>-80&&relZ<60);
    // Spin opponent wheels
    o.mesh.children.forEach(ch=>{
      if(ch.geometry&&ch.geometry.type==='CylinderGeometry'){
        const p=ch.geometry.parameters;
        if(p&&p.radiusTop>.2) ch.rotation.x=wheelRot*(o.speed/playerSpeed||1);
      }
    });
    // Opponent vs player collision (can trigger player spinout)
    if(!spinning&&o.mesh.visible){
      const dx=Math.abs(o.mesh.position.x-playerCar.position.x);
      const dz=Math.abs(o.mesh.position.z-playerCar.position.z);
      if(dx<1.2&&dz<2.6) triggerSpinout();
    }
    // Opponent vs opponent gentle nudge
    opponents.forEach(o2=>{
      if(o2===o) return;
      const dx=Math.abs(o2.mesh.position.x-o.mesh.position.x);
      const dz=Math.abs(o2.mesh.position.z-o.mesh.position.z);
      if(dx<1.0&&dz<2.2&&!o.spinout&&!o2.spinout&&Math.random()<.008){
        o.spinout=true; o.spinTimer=1.2;
        o2.spinout=true; o2.spinTimer=1.0;
      }
    });
  });

  // ---- ROAD UPDATE ----
  updateRoad(playerWorldZ);

  // ---- CAMERA follows player ----
  const targetCamX = playerX * 0.38;
  camera.position.x += (targetCamX - camera.position.x) * 0.1;
  camera.position.z = playerWorldZ + 9;   // always 9 units behind car
  if(spinning) camera.position.y = 4.2 + Math.sin(elapsed*12) * 0.05;
  else camera.position.y = 4.2;
  camera.lookAt(playerX * 0.25, 0.8, playerWorldZ - 20);
  neonFill.position.set(playerX, 4, playerWorldZ + 5);
  neonFill.intensity=1.2+Math.sin(elapsed*6)*.12;

  // ---- HUD ----
  hudTimeEl.textContent=fmtTime(elapsed);
  hudSpeedEl.textContent=Math.round(playerSpeed);
  const place=getPlayerPlace();
  hudPosEl.textContent=PLACE_LABELS[Math.min(place-1,7)];
  hudPosEl.className='hud-value'+(place===1?' ':place>4?' alert':' ');
  const pct=Math.min(100,playerDist/RACE_DIST*100);
  progressFill.style.width=pct+'%';
  progressPlayer.style.left=pct+'%';
  distLabel.textContent=Math.min(Math.round(playerDist),RACE_DIST).toLocaleString()+' / '+RACE_DIST.toLocaleString()+'m';
  speedFill.style.width=(playerSpeed/PLAYER_TOP_SPEED*100)+'%';

  // ---- FINISH CHECK ----
  if(playerDist>=RACE_DIST&&!finishShown){
    finishShown=true;
    endRace();
  }

  renderer.render(scene,camera);
}

// Kick off idle render
loop(0);
</script>
