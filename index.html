<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tilt Racer — AppADay 048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:   #0a0a0f;
    --asphalt: #12121a;
    --neon:    #00f5c4;
    --hot:     #ff3f6c;
    --amber:   #ffb830;
    --white:   #f0f0f0;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: var(--white);
    touch-action: none;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ---- OVERLAY SCREENS ---- */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(6px);
    z-index: 10;
    padding: 24px;
    text-align: center;
  }
  .screen.hidden { display: none; }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(2.4rem, 10vw, 4.5rem);
    letter-spacing: 0.04em;
    color: var(--neon);
    text-shadow: 0 0 24px rgba(0,245,196,0.6), 0 0 60px rgba(0,245,196,0.25);
    line-height: 1;
    margin-bottom: 8px;
  }
  .tagline {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.7rem, 3vw, 1rem);
    color: var(--amber);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .tilt-demo {
    width: 80px; height: 80px;
    margin: 0 auto 32px;
    position: relative;
  }
  .tilt-demo .phone {
    width: 40px; height: 70px;
    border: 3px solid var(--neon);
    border-radius: 8px;
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%) rotate(-15deg);
    animation: tiltAnim 2s ease-in-out infinite alternate;
  }
  @keyframes tiltAnim {
    from { transform: translate(-50%,-50%) rotate(-20deg); }
    to   { transform: translate(-50%,-50%) rotate(20deg); }
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(1rem, 4vw, 1.3rem);
    letter-spacing: 0.12em;
    color: var(--black);
    background: var(--neon);
    border: none;
    border-radius: 6px;
    padding: 16px 48px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 0 24px rgba(0,245,196,0.4);
  }
  .btn:active { transform: scale(0.96); }
  .btn.danger {
    background: var(--hot);
    box-shadow: 0 0 24px rgba(255,63,108,0.4);
    margin-top: 16px;
  }

  .instruction {
    font-size: clamp(0.85rem, 3vw, 1rem);
    color: rgba(240,240,240,0.6);
    margin-bottom: 32px;
    max-width: 300px;
    line-height: 1.6;
  }

  /* ---- HUD ---- */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 20px;
    pointer-events: none;
    z-index: 5;
  }
  #hud.hidden { display: none; }

  .hud-block {
    display: flex; flex-direction: column; align-items: center;
  }
  .hud-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: rgba(0,245,196,0.5);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .hud-value {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    color: var(--white);
  }
  #speedBar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.08);
    z-index: 5;
  }
  #speedFill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon), var(--amber));
    width: 0%;
    transition: width 0.1s;
  }

  /* game-over extras */
  .go-score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 6vw, 2.2rem);
    color: var(--amber);
    margin-bottom: 4px;
  }
  .go-sub {
    font-size: 0.85rem;
    color: rgba(240,240,240,0.5);
    margin-bottom: 32px;
  }

  /* portfolio back link */
  #backLink {
    position: fixed; bottom: 14px; right: 16px;
    font-size: 0.7rem;
    color: rgba(240,240,240,0.25);
    text-decoration: none;
    z-index: 5;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.05em;
  }
  #backLink:hover { color: var(--neon); }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <div class="logo">TILT<br>RACER</div>
  <div class="tagline">AppADay &mdash; 048</div>
  <div class="tilt-demo"><div class="phone"></div></div>
  <p class="instruction">Tilt your device left and right to steer. Dodge traffic. Survive as long as you can.</p>
  <button class="btn" id="startBtn">START ENGINE</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameOverScreen">
  <div class="logo" style="font-size:clamp(1.8rem,8vw,3rem);margin-bottom:12px;">WRECKED</div>
  <div class="go-score" id="finalScore">0 pts</div>
  <div class="go-sub" id="finalDist">0 m &mdash; 0s survived</div>
  <button class="btn" id="retryBtn">TRY AGAIN</button>
  <button class="btn danger" id="menuBtn">MAIN MENU</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-block">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="hudScore">0</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Speed</span>
    <span class="hud-value" id="hudSpeed">0</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Best</span>
    <span class="hud-value" id="hudBest">0</span>
  </div>
</div>
<div id="speedBar"><div id="speedFill"></div></div>

<a href="https://augustineiacopelli.github.io/appaday/" id="backLink">&larr; AppADay Portfolio</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ---- STATE ----
let state = 'start'; // 'start' | 'playing' | 'over'
let tiltX = 0;       // -1 to 1 from device orientation
let usingKeyboard = false;
let keys = {};
let score = 0;
let distance = 0;
let elapsed = 0;
let bestScore = 0;
let animId = null;
let lastTime = null;

// ---- STORAGE ----
try { bestScore = parseInt(localStorage.getItem('tiltRacerBest') || '0'); } catch(e){}

// ---- THREE SETUP ----
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 30, 120);

const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 200);
camera.position.set(0, 3.5, 8);
camera.lookAt(0, 1, -10);

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ---- ROAD ----
const ROAD_WIDTH = 10;
const LANE_COUNT = 3;
const SEG_LENGTH = 20;
const SEG_COUNT = 12;
const TOTAL_ROAD = SEG_LENGTH * SEG_COUNT;

// Road surface
const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, TOTAL_ROAD, 1, SEG_COUNT * 4);
const roadMat = new THREE.MeshLambertMaterial({ color: 0x1a1a28 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.position.z = -TOTAL_ROAD / 2 + 8;
scene.add(road);

// Lane markers — dashed white lines
const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.35, transparent: true });
const dashGeo = new THREE.PlaneGeometry(0.12, 2.5);
const dashes = [];
for (let lane = -1; lane <= 1; lane += 2) {
  for (let i = 0; i < 40; i++) {
    const d = new THREE.Mesh(dashGeo, dashMat);
    d.rotation.x = -Math.PI / 2;
    d.position.set(lane * (ROAD_WIDTH / LANE_COUNT), 0.01, -i * 5);
    scene.add(d);
    dashes.push({ mesh: d, laneX: lane * (ROAD_WIDTH / LANE_COUNT), idx: i });
  }
}

// Road edge neon lines
function makeEdge(x) {
  const geo = new THREE.PlaneGeometry(0.18, TOTAL_ROAD);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00f5c4, opacity: 0.6, transparent: true });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.015, road.position.z);
  scene.add(m);
}
makeEdge(-ROAD_WIDTH / 2);
makeEdge(ROAD_WIDTH / 2);

// ---- LIGHTING ----
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xffeedd, 0.8);
sun.position.set(5, 20, 5);
scene.add(sun);
const neonFill = new THREE.PointLight(0x00f5c4, 1.2, 18);
neonFill.position.set(0, 4, 4);
scene.add(neonFill);

// ---- PLAYER CAR ----
function buildCar(bodyColor, accentColor) {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(1.4, 0.5, 2.6);
  const bodyMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.42;
  group.add(body);

  // Cabin
  const cabinGeo = new THREE.BoxGeometry(1.0, 0.4, 1.4);
  const cabinMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  const cabin = new THREE.Mesh(cabinGeo, cabinMat);
  cabin.position.set(0, 0.82, -0.1);
  group.add(cabin);

  // Windshield tint
  const windGeo = new THREE.PlaneGeometry(0.9, 0.35);
  const windMat = new THREE.MeshBasicMaterial({ color: 0x00f5c4, opacity: 0.25, transparent: true, side: THREE.DoubleSide });
  const wind = new THREE.Mesh(windGeo, windMat);
  wind.position.set(0, 0.82, 0.62);
  group.add(wind);

  // Accent stripe
  const stripeGeo = new THREE.BoxGeometry(1.42, 0.08, 2.62);
  const stripeMat = new THREE.MeshBasicMaterial({ color: accentColor });
  const stripe = new THREE.Mesh(stripeGeo, stripeMat);
  stripe.position.y = 0.58;
  group.add(stripe);

  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.2, 12);
  const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  [[-0.75, 0.28, 0.9], [0.75, 0.28, 0.9], [-0.75, 0.28, -0.9], [0.75, 0.28, -0.9]].forEach(([x,y,z]) => {
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI / 2;
    w.position.set(x, y, z);
    group.add(w);
  });

  // Headlights
  const hlGeo = new THREE.BoxGeometry(0.22, 0.12, 0.05);
  const hlMat = new THREE.MeshBasicMaterial({ color: 0xffeeaa });
  [[-0.45, 0.45, 1.33], [0.45, 0.45, 1.33]].forEach(([x,y,z]) => {
    const hl = new THREE.Mesh(hlGeo, hlMat);
    hl.position.set(x, y, z);
    group.add(hl);
  });

  return group;
}

const playerCar = buildCar(0xff3f6c, 0x00f5c4);
playerCar.position.set(0, 0, 5);
scene.add(playerCar);

let playerX = 0; // -1 to 1 normalized
const PLAYER_X_LIMIT = (ROAD_WIDTH / 2) - 0.8;

// ---- TRAFFIC ----
const TRAFFIC_COLORS = [0x4488ff, 0xffb830, 0x88ff44, 0xcc44ff, 0xff8844, 0x44ffee];
const trafficPool = [];
const activeTraffic = [];

function spawnTrafficCar() {
  let car;
  if (trafficPool.length > 0) {
    car = trafficPool.pop();
    car.visible = true;
  } else {
    const color = TRAFFIC_COLORS[Math.floor(Math.random() * TRAFFIC_COLORS.length)];
    car = buildCar(color, 0xffffff);
    scene.add(car);
  }
  // Random lane: -3.3, 0, 3.3
  const laneOffsets = [-ROAD_WIDTH/3, 0, ROAD_WIDTH/3];
  const lane = laneOffsets[Math.floor(Math.random() * 3)];
  car.position.set(lane, 0, playerCar.position.z - 80 - Math.random() * 40);
  car.rotation.y = Math.PI; // facing player
  activeTraffic.push(car);
}

// ---- ROADSIDE OBJECTS (lamp posts) ----
const lampPosts = [];
function buildLamp() {
  const g = new THREE.Group();
  const poleGeo = new THREE.CylinderGeometry(0.06, 0.08, 5, 6);
  const poleMat = new THREE.MeshLambertMaterial({ color: 0x334455 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.y = 2.5;
  g.add(pole);
  const headGeo = new THREE.BoxGeometry(0.4, 0.15, 0.8);
  const headMat = new THREE.MeshBasicMaterial({ color: 0xffeeaa });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0, 5.1, -0.2);
  g.add(head);
  return g;
}
for (let i = 0; i < 20; i++) {
  const lL = buildLamp(), lR = buildLamp();
  lL.position.set(-ROAD_WIDTH/2 - 1.2, 0, -i * 12);
  lR.position.set(ROAD_WIDTH/2 + 1.2, 0, -i * 12);
  lR.rotation.y = Math.PI;
  scene.add(lL); scene.add(lR);
  lampPosts.push(lL, lR);
}

// ---- SPEED / GAME PARAMS ----
let roadSpeed = 22;       // world units per second
const MAX_SPEED = 80;
const ACCEL = 3.5;
let spawnTimer = 0;
let spawnInterval = 1.8;

// ---- TILT INPUT ----
let permissionGranted = false;

function handleOrientation(e) {
  // gamma = left-right tilt (-90 to 90)
  const gamma = e.gamma || 0;
  tiltX = Math.max(-1, Math.min(1, gamma / 30));
}

function requestTilt() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === 'granted') {
        window.addEventListener('deviceorientation', handleOrientation);
        permissionGranted = true;
      }
    }).catch(() => {});
  } else {
    window.addEventListener('deviceorientation', handleOrientation);
    permissionGranted = true;
  }
}

// Keyboard fallback
window.addEventListener('keydown', e => { keys[e.key] = true; usingKeyboard = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

// ---- UI ----
const startScreen   = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const hud           = document.getElementById('hud');
const hudScore      = document.getElementById('hudScore');
const hudSpeed      = document.getElementById('hudSpeed');
const hudBest       = document.getElementById('hudBest');
const speedFill     = document.getElementById('speedFill');
const finalScore    = document.getElementById('finalScore');
const finalDist     = document.getElementById('finalDist');

hudBest.textContent = bestScore;

document.getElementById('startBtn').addEventListener('click', () => {
  requestTilt();
  startGame();
});
document.getElementById('retryBtn').addEventListener('click', () => {
  requestTilt();
  startGame();
});
document.getElementById('menuBtn').addEventListener('click', () => {
  gameOverScreen.classList.add('hidden');
  startScreen.classList.remove('hidden');
  hud.classList.add('hidden');
  state = 'start';
});

// ---- GAME LOGIC ----
function startGame() {
  // Reset
  score = 0; distance = 0; elapsed = 0;
  playerX = 0;
  playerCar.position.x = 0;
  roadSpeed = 22;
  spawnTimer = 0;
  spawnInterval = 1.8;

  // Clear traffic
  activeTraffic.forEach(c => { c.visible = false; trafficPool.push(c); });
  activeTraffic.length = 0;

  // Reset dash positions
  dashes.forEach(d => { d.mesh.position.z = -d.idx * 5; });

  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  hud.classList.remove('hidden');

  state = 'playing';
  lastTime = null;
  if (animId) cancelAnimationFrame(animId);
  loop(0);
}

function endGame() {
  state = 'over';
  hud.classList.add('hidden');
  gameOverScreen.classList.remove('hidden');

  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('tiltRacerBest', bestScore); } catch(e){}
    hudBest.textContent = bestScore;
  }

  finalScore.textContent = score + ' pts';
  finalDist.textContent = Math.round(distance) + ' m — ' + Math.round(elapsed) + 's survived';
}

// ---- COLLISION ----
function checkCollisions() {
  const px = playerCar.position.x;
  const pz = playerCar.position.z;
  for (const car of activeTraffic) {
    const dx = Math.abs(car.position.x - px);
    const dz = Math.abs(car.position.z - pz);
    if (dx < 1.1 && dz < 2.2) return true;
  }
  return false;
}

// ---- MAIN LOOP ----
function loop(now) {
  animId = requestAnimationFrame(loop);

  if (!lastTime) { lastTime = now; return; }
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (state !== 'playing') {
    renderer.render(scene, camera);
    return;
  }

  elapsed += dt;

  // Accelerate
  roadSpeed = Math.min(MAX_SPEED, roadSpeed + ACCEL * dt);

  // Tilt input
  if (usingKeyboard) {
    if (keys['ArrowLeft']  || keys['a']) tiltX = -1;
    else if (keys['ArrowRight'] || keys['d']) tiltX = 1;
    else tiltX *= 0.85;
  }

  // Move player
  const steerSpeed = 6.5;
  playerX = Math.max(-PLAYER_X_LIMIT, Math.min(PLAYER_X_LIMIT, playerX + tiltX * steerSpeed * dt));
  playerCar.position.x = playerX;

  // Tilt car body visually
  playerCar.rotation.z = -tiltX * 0.12;
  playerCar.rotation.y = -tiltX * 0.08;

  // Scroll road dashes
  const scrollDelta = roadSpeed * dt;
  dashes.forEach(d => {
    d.mesh.position.z += scrollDelta;
    if (d.mesh.position.z > playerCar.position.z + 10) {
      d.mesh.position.z -= 200;
    }
  });

  // Scroll lamp posts
  lampPosts.forEach(l => {
    l.position.z += scrollDelta;
    if (l.position.z > playerCar.position.z + 15) {
      l.position.z -= 240;
    }
  });

  // Spawn traffic
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTrafficCar();
    spawnInterval = Math.max(0.55, spawnInterval - 0.012);
    spawnTimer = spawnInterval;
  }

  // Move traffic toward player
  const trafficRelSpeed = roadSpeed * 0.55;
  for (let i = activeTraffic.length - 1; i >= 0; i--) {
    const car = activeTraffic[i];
    car.position.z += (roadSpeed + trafficRelSpeed) * dt;
    if (car.position.z > playerCar.position.z + 20) {
      car.visible = false;
      trafficPool.push(car);
      activeTraffic.splice(i, 1);
      score += 10;
    }
  }

  // Score & distance
  distance += roadSpeed * dt;
  score += Math.floor(roadSpeed * dt * 0.5);

  // Camera shake at high speed
  const shake = roadSpeed > 55 ? (roadSpeed - 55) / MAX_SPEED * 0.06 : 0;
  camera.position.x = playerCar.position.x * 0.35 + (Math.random() - 0.5) * shake;
  camera.position.y = 3.5 + (Math.random() - 0.5) * shake * 0.5;

  // Neon light pulse
  neonFill.position.x = playerCar.position.x;
  neonFill.intensity = 1.0 + Math.sin(elapsed * 8) * 0.15;

  // HUD
  hudScore.textContent = score;
  hudSpeed.textContent = Math.round(roadSpeed);
  speedFill.style.width = (roadSpeed / MAX_SPEED * 100) + '%';

  // Collision
  if (checkCollisions()) {
    endGame();
    return;
  }

  renderer.render(scene, camera);
}

// ---- START RENDER (idle) ----
function idleLoop(now) {
  animId = requestAnimationFrame(idleLoop);
  if (state !== 'start' && state !== 'over') return;

  // Gentle camera drift on start screen
  camera.position.x = Math.sin(now * 0.0003) * 1.5;
  camera.position.y = 3.5 + Math.sin(now * 0.0005) * 0.3;

  // Scroll dashes slowly for ambiance
  dashes.forEach(d => {
    d.mesh.position.z += 0.06;
    if (d.mesh.position.z > 15) d.mesh.position.z -= 200;
  });
  lampPosts.forEach(l => {
    l.position.z += 0.06;
    if (l.position.z > 20) l.position.z -= 240;
  });

  renderer.render(scene, camera);
}
idleLoop(0);
</script>
</body>
</html>
